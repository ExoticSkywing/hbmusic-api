services:
  hbmusic:
    build: .
    container_name: hbmusic
    restart: unless-stopped
    ports:
      - "18123:3000"
    environment:
      # 服务配置
      - PORT=3000
      - HOST=0.0.0.0

      # 部署域名（生产环境必须修改）
      - BASE_URL=https://hbmusic.1yo.cc

      # 网易云音源（Meting API，内置 VIP Cookie）
      - METING_API=https://v.iarc.top

      # 请求重试次数
      - MAX_RETRIES=2

      # 日志级别
      - LOG_LEVEL=info

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
